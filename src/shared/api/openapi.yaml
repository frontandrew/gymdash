        place:
          type: integer
          description: Место в этапе
        percent:
          type: number
          format: float
          description: Рейтинг
        city:
          type: string
          description: Город проведения этапа
        link:
          type: string
          format: uri
          description: Ссылка на видео

    UserClassHistory:
      type: object
      properties:
        old:
          type: string
          description: Старый класс
        new:
          type: string
          description: Новый класс
        date:
          type: integer

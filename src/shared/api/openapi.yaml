          description: История переходов между классами

    CalculatorClassBand:
      type: object
      properties:
        class:
          type: string
          description: Класс
        classPercent:
          type: string
          description: С какого процента начинается класс
        startTime:
          type: string
          description: Нижняя граница попадания в класс (мин:сек.мсек)
        endTime:
          type: string
          description: Верхняя граница попадания в класс (мин:сек.мсек)

    CalculatorResult:
      type: object
      properties:
        referenceTime:
          type: string
          description: Эталонное время (мин:сек.мсек)
        results:
          type: array
          items:
            $ref: '#/components/schemas/CalculatorClassBand'

    Error:
      type: object
      properties:
        error:
          type: string
          description: Сообщение об ошибке

  parameters:
    Signature:
      name: signature
      in: query
      required: true
      schema:
        type: string
      description: API-ключ для авторизации

paths:
  /championships/list:
    get:
      summary: Список чемпионатов
      description: |
        Возвращает список чемпионатов, включая gymkhana-gp и онлайн чемпионаты.
        Если не указаны `fromYear` и `toYear`, возвращаются чемпионаты только за текущий год.
      operationId: getChampionshipsList
      tags:
        - Чемпионаты
      parameters:
        - $ref: '#/components/parameters/Signature'
        - name: types
          in: query
          required: false
          schema:
            type: string
            example: "online,gp"
          description: |
            Фильтр по типу. Возможные значения: `online`, `gp`, `offline`.
            Для нескольких значений — через запятую.
            По умолчанию — все типы.
        - name: fromYear
          in: query
          required: false
          schema:
            type: integer
            minLength: 4
            maxLength: 4
            example: 2020
          description: Начиная с какого года. Формат — 4 цифры.
        - name: toYear
          in: query
          required: false
          schema:
            type: integer
            minLength: 4
            maxLength: 4
            example: 2022
          description: До какого года (включительно). Формат — 4 цифры.
      responses:
        '200':
          description: Список чемпионатов
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ChampionshipListItem'
              example:
                - id: 18
                  title: "Triangle gp"
                  year: "2021"
                  description: "<p>Описание чемпионата</p>"
                  stagesCount: 7
                  type: "online"
                - id: 2
                  title: "Gymkhana GP 2019"
                  year: 2019
                  description: "<p>Описание</p>"
                  stagesCount: 6
                  type: "gp"

  /championships/get:
    get:
      summary: Информация о чемпионате
      description: |
        Возвращает детальную информацию о чемпионате, включая список этапов.
        Формат ответа зависит от типа чемпионата (`gp`, `offline`, `online`).
      operationId: getChampionship
      tags:
        - Чемпионаты
      parameters:
        - $ref: '#/components/parameters/Signature'
        - name: id
          in: query
          required: true
          schema:
            type: integer
          description: ID чемпионата
        - name: type
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/ChampionshipType'
          description: Тип чемпионата
      responses:
        '200':
          description: Информация о чемпионате
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ChampionshipGp'
                  - $ref: '#/components/schemas/ChampionshipOffline'
                  - $ref: '#/components/schemas/ChampionshipOnline'
                discriminator:
                  propertyName: type

  /championships/results:
    get:
      summary: Итоги чемпионата
      description: |
        Возвращает итоговую таблицу чемпионата с местами, баллами и результатами по этапам.
        Доступно только для типов `offline` и `gp`.
      operationId: getChampionshipResults
      tags:
        - Чемпионаты
      parameters:
        - $ref: '#/components/parameters/Signature'
        - name: id
          in: query
          required: true
          schema:
            type: integer
          description: ID чемпионата
        - name: type
          in: query
          required: true
          schema:
            type: string
            enum: [offline, gp]
          description: Тип чемпионата (только offline или gp)
      responses:
        '200':
          description: Итоги чемпионата
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ChampionshipResultItem'

  /stages/get:
    get:
      summary: Данные об этапе
      description: |
        Возвращает детальные данные об этапе, включая результаты участников.
        Формат ответа зависит от типа чемпионата.
      operationId: getStage
      tags:
        - Этапы
      parameters:
        - $ref: '#/components/parameters/Signature'
        - name: id
          in: query
          required: true
          schema:
            type: integer
          description: ID этапа
        - name: type
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/ChampionshipType'
          description: Тип чемпионата
      responses:
        '200':
          description: Данные об этапе
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/StageOffline'
                  - $ref: '#/components/schemas/StageGp'
                  - $ref: '#/components/schemas/StageOnline'
                discriminator:
                  propertyName: type

  /figures/list:
    get:
      summary: Список базовых фигур
      description: Возвращает список всех базовых фигур с общей статистикой.
      operationId: getFiguresList
      tags:
        - Фигуры
      parameters:
        - $ref: '#/components/parameters/Signature'
      responses:
        '200':
          description: Список фигур
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FigureListItem'

  /figures/get:
    get:
      summary: Информация о фигуре
      description: Возвращает детальную информацию о фигуре, включая результаты всех спортсменов.
      operationId: getFigure
      tags:
        - Фигуры
      parameters:
        - $ref: '#/components/parameters/Signature'
        - name: id
          in: query
          required: true
          schema:
            type: integer
          description: ID фигуры
      responses:
        '200':
          description: Информация о фигуре с результатами
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Figure'

  /users/list:
    get:
      summary: Список спортсменов
      description: |
        Возвращает список спортсменов с пагинацией.
        Результаты сортируются по классу (от A до N), внутри класса — по фамилии.
      operationId: getUsersList
      tags:
        - Спортсмены
      parameters:
        - $ref: '#/components/parameters/Signature'
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          description: Количество записей (макс. 100, по умолчанию 20)
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
          description: Смещение для пагинации
        - name: class
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/AthleteClass'
          description: Фильтр по классу спортсмена
      responses:
        '200':
          description: Список спортсменов с пагинацией
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserList'

  /users/get:
    get:
      summary: Информация о спортсмене
      description: Возвращает полный профиль спортсмена с историей выступлений, результатами по фигурам и историей классов.
      operationId: getUser
      tags:
        - Спортсмены
      parameters:
        - $ref: '#/components/parameters/Signature'
        - name: id
          in: query
          required: true
          schema:
            type: integer
          description: ID спортсмена
      responses:
        '200':
          description: Профиль спортсмена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'

  /calculate/get:
    get:
      summary: Калькулятор классов
      description: |
        Рассчитывает, в какие классы попадает результат спортсмена, исходя из его класса и времени.

        Поддерживаемые форматы времени: `mm:ss.msec`, `mm:ss,msec`, `mm:ss:msec`, `mm:ss`, `mm`.
        Минуты и секунды не могут превышать 60. Миллисекунды округляются до 3 знаков.

        В качестве класса можно указать ID, буквенное обозначение на русском или английском языке (регистр не важен).
        Примеры: `D1`, `d1`, `Д1`, `д1`.
      operationId: calculate
      tags:
        - Калькулятор
      parameters:
        - $ref: '#/components/parameters/Signature'
        - name: class
          in: query
          required: true
          schema:
            type: string
            example: "D1"
          description: Класс спортсмена (ID или буквенное обозначение, рус/англ)
        - name: time
          in: query
          required: true
          schema:
            type: string
            example: "01:21.540"
          description: |
            Время спортсмена. Форматы: `mm:ss.msec`, `mm:ss,msec`, `mm:ss:msec`, `mm:ss`, `mm`
      responses:
        '200':
          description: Результат расчёта по классам
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CalculatorResult'
        '400':
          description: Некорректный формат времени или класса
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

tags:
  - name: Чемпионаты
    description: Операции с чемпионатами
  - name: Этапы
    description: Операции с этапами
  - name: Фигуры
    description: Базовые фигуры мотоджимханы
  - name: Спортсмены
    description: Профили и статистика спортсменов
  - name: Калькулятор
    description: Калькулятор классов по времени

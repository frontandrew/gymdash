openapi: 3.0.3
info:
  title: MG-Cup API
  description: |
    API для интеграции с системой мотоджимханы MG-Cup.
    Предоставляет доступ к данным о чемпионатах, этапах, спортсменах и базовых фигурах.

    Все запросы требуют передачи API-ключа в параметре `signature`.
    По вопросам расширения функционала: gymkhana.cup@gmail.com
  version: 1.0.0
  contact:
    email: gymkhana.cup@gmail.com

servers:
  - url: https://api.mg-cup.ru
    description: Production server

security:
  - ApiKeyAuth: []

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: query
      name: signature
      description: API-ключ для авторизации запросов

  schemas:
    ChampionshipType:
      type: string
      enum: [online, offline, gp]
      description: Тип чемпионата

    AthleteClass:
      type: string
      enum: [A, B, C1, C2, C3, D1, D2, D3, D4, N]
      description: Класс спортсмена/этапа

    StageStatusGpOnline:
      type: string
      enum:
        - Предстоящий этап
        - Приём результатов
        - Подведение итогов
        - Прошедший этап
        - Этап отменён
      description: Статус этапа (GP и Online)

    StageStatusOffline:
      type: string
      enum:
        - Предстоящий этап
        - Открыта регистрация на этап
        - Завершена регистрация на этап
        - Текущий этап
        - Подведение итогов
        - Прошедший этап
        - Этап отменён
      description: Статус этапа (Offline)

    ChampionshipListItem:
      type: object
      properties:
        id:
          type: integer
          description: ID чемпионата
          example: 18
        title:
          type: string
          description: Название чемпионата
          example: Triangle gp
        year:
          description: Год проведения чемпионата
          oneOf:
            - type: string
            - type: integer
          example: "2021"
        description:
          type: string
          description: Описание чемпионата (HTML)
          example: "<p>Описание чемпионата</p>"
        stagesCount:
          type: integer
          description: Количество этапов
          example: 7
        type:
          $ref: '#/components/schemas/ChampionshipType'

    StageGpSummary:
      type: object
      description: Краткая информация об этапе GP
      properties:
        id:
          type: integer
          description: ID этапа
        status:
          $ref: '#/components/schemas/StageStatusGpOnline'
        title:
          type: string
          description: Название этапа
        description:
          type: string
          description: Описание этапа (HTML)
        usersCount:
          type: integer
          description: Количество активных участников
        class:
          $ref: '#/components/schemas/AthleteClass'
        trackUrl:
          type: string
          format: uri
          description: Ссылка на фото трассы
        dateStart:
          type: integer
          format: int64
          description: Дата начала этапа (unixtime)
        dateEnd:
          type: integer
          format: int64
          description: Дата завершения этапа (unixtime)
        referenceTimeSeconds:
          type: integer
          description: Эталонное время (миллисекунды)
        referenceTime:
          type: string
          description: Эталонное время (мин:сек.мсек)
          example: "1:30.000"
        bestTimeSeconds:
          type: integer
          description: Лучшее время (миллисекунды)
        bestTime:
          type: string
          description: Лучшее время (мин:сек.мсек)
        bestUserId:
          type: integer
          description: ID спортсмена с лучшим результатом
        bestUserFirstName:
          type: string
          description: Имя спортсмена с лучшим результатом
        bestUserLastname:
          type: string
          description: Фамилия спортсмена с лучшим результатом
        bestUserFullName:
          type: string
          description: Полное имя спортсмена с лучшим результатом
        bestUserCity:
          type: string
          description: Город спортсмена с лучшим результатом

    StageSummaryOffline:
      type: object
      description: Краткая информация об оффлайн-этапе
      properties:
        id:
          type: integer
          description: ID этапа
        status:
          $ref: '#/components/schemas/StageStatusOffline'
        title:
          type: string
          description: Название этапа
        description:
          type: string
          description: Описание этапа (HTML)
        usersCount:
          type: integer
          description: Количество участников
        class:
          $ref: '#/components/schemas/AthleteClass'
        trackUrl:
          type: string
          format: uri
          description: Фото трассы
        city:
          type: string
          description: Город проведения этапа
        dateOfThe:
          type: integer
          format: int64
          description: Дата этапа (unixtime)
        referenceTimeSeconds:
          type: integer
          description: Эталонное время (миллисекунды)
        referenceTime:
          type: string
          description: Эталонное время (мин:сек.мсек)
        bestTimeSeconds:
          type: integer
          description: Лучшее время (миллисекунды)
        bestTime:
          type: string
          description: Лучшее время (мин:сек.мсек)
        bestUserId:
          type: integer
          description: ID спортсмена с лучшим временем
        bestUserFirstName:
          type: string
          description: Имя спортсмена с лучшим временем
        bestUserLastname:
          type: string
          description: Фамилия спортсмена с лучшим временем
        bestUserFullName:
          type: string
          description: Полное имя спортсмена с лучшим временем
        bestUserCity:
          type: string
          description: Город спортсмена с лучшим временем

    StageSummaryOnline:
      type: object
      description: Краткая информация об онлайн-этапе
      properties:
        id:
          type: integer
          description: ID этапа
        title:
          type: string
          description: Название этапа
        description:
          type: string
          description: Описание этапа (HTML)
        usersCount:
          type: integer
          description: Количество участников
        class:
          $ref: '#/components/schemas/AthleteClass'
        trackUrl:
          type: string
          format: uri
          description: Ссылка на фото трассы
        dateStart:
          type: integer
          format: int64
          description: Дата начала этапа (unixtime)
        dateEnd:
          type: integer
          format: int64
          description: Дата завершения этапа (unixtime)
        bestTimeSeconds:
          type: integer
          description: Лучшее время (миллисекунды)
        bestTime:
          type: string
          description: Лучшее время (мин:сек.мсек)
        bestUserId:
          type: integer
          description: ID спортсмена с лучшим результатом
        bestUserFirstName:
          type: string
          description: Имя спортсмена с лучшим результатом
        bestUserLastname:
          type: string
          description: Фамилия спортсмена с лучшим результатом
        bestUserFullName:
          type: string
          description: Полное имя спортсмена с лучшим результатом
        bestUserCity:
          type: string
          description: Город спортсмена с лучшим результатом

    ChampionshipGp:
      type: object
      properties:
        id:
          type: integer
          description: ID чемпионата
        title:
          type: string
          description: Название чемпионата
        year:
          type: integer
          description: Год проведения чемпионата
        description:
          type: string
          description: Описание чемпионата (HTML)
        stages:
          type: array
          items:
            $ref: '#/components/schemas/StageGpSummary'

    ChampionshipOffline:
      type: object
      properties:
        id:
          type: integer
          description: ID чемпионата
        title:
          type: string
          description: Название чемпионата
        year:
          type: integer
          description: Год проведения чемпионата
        description:
          type: string
          description: Описание чемпионата (HTML)
        stages:
          type: array
          items:
            $ref: '#/components/schemas/StageSummaryOffline'

    ChampionshipOnline:
      type: object
      properties:
        id:
          type: integer
          description: ID чемпионата
        title:
          type: string
          description: Название чемпионата
        year:
          type: string
          description: Год проведения чемпионата
        description:
          type: string
          description: Описание чемпионата (HTML)
        stages:
          type: array
          items:
            $ref: '#/components/schemas/StageSummaryOnline'

    ChampionshipResultStage:
      type: object
      properties:
        id:
          type: integer
          description: ID этапа
        title:
          type: string
          description: Название этапа
        points:
          type: integer
          description: Количество баллов за этап

    ChampionshipResultItem:
      type: object
      properties:
        place:
          type: integer
          description: Место в чемпионате
        userId:
          type: integer
          description: ID пользователя
        userFullName:
          type: string
          description: Полное имя спортсмена
        userFirstName:
          type: string
          description: Имя спортсмена
        userLastName:
          type: string
          description: Фамилия спортсмена
        userCity:
          type: string
          description: Город спортсмена
        userClass:
          type: string
          description: Класс спортсмена
        points:
          type: integer
          description: Суммарное количество баллов
        stages:
          type: array
          items:
            $ref: '#/components/schemas/ChampionshipResultStage'

    AttemptResult:
      type: object
      properties:
        timeSeconds:
          type: integer
          description: Время без штрафа (миллисекунды)
        time:
          type: string
          description: Время без штрафа (мин:сек.мсек)
        fine:
          type: integer
          description: Штраф
        resultTimeSeconds:
          type: integer
          description: Итоговое время со штрафом (миллисекунды)
        resultTime:
          type: string
          description: Итоговое время со штрафом (мин:сек.мсек)
        attempt:
          type: integer
          description: Номер попытки
        isFail:
          type: boolean
          description: Зачёт или нет (false = зачёт)
        video:
          type: string
          format: uri
          description: Ссылка на видео заезда

    OfflineStageResultItem:
      type: object
      properties:
        userId:
          type: integer
          description: ID спортсмена
        userFullName:
          type: string
          description: Полное имя спортсмена
        userLastName:
          type: string
          description: Фамилия спортсмена
        userFirstName:
          type: string
          description: Имя спортсмена
        userCity:
          type: string
          description: Город спортсмена
        userCountry:
          type: string
          description: Страна спортсмена
        motorcycle:
          type: string
          description: Мотоцикл
        athleteClass:
          $ref: '#/components/schemas/AthleteClass'
          description: Класс спортсмена на момент участия
        placeInAthleteClass:
          type: integer
          description: Место в классе A-N
        champClass:
          type: string
          description: Класс награждения
        placeInChampClass:
          type: integer
          description: Место в классе награждения
        attemtps:
          type: array
          items:
            $ref: '#/components/schemas/AttemptResult'
        bestTimeSeconds:
          type: integer
          description: Лучшее итоговое время (миллисекунды)
        bestTime:
          type: string
          description: Лучшее итоговое время (мин:сек.мсек)
        percent:
          type: number
          format: float
          description: Процент отставания от эталонного времени
        newClass:
          type: string
          nullable: true
          description: Новый класс спортсмена. null если класс не изменился

    GpPreviousResult:
      type: object
      properties:
        date:
          type: integer
          format: int64
          description: Дата результата (unixtime)
        timeSeconds:
          type: integer
          description: Время без штрафа (миллисекунды)
        time:
          type: string
          description: Время без штрафа (мин:сек.мсек)
        fine:
          type: integer
          description: Штраф
        resultTimeSeconds:
          type: integer
          description: Итоговое время со штрафом (миллисекунды)
        resultTime:
          type: string
          description: Итоговое время со штрафом (мин:сек.мсек)
        class:
          $ref: '#/components/schemas/AthleteClass'
          description: Класс на момент отправки результата
        video:
          type: string
          format: uri
          description: Ссылка на видео

    GpStageResultItem:
      type: object
      properties:
        userId:
          type: integer
          description: ID спортсмена
        userFullName:
          type: string
          description: Полное имя спортсмена
        userLastName:
          type: string
          description: Фамилия спортсмена
        userFirstName:
          type: string
          description: Имя спортсмена
        motorcycle:
          type: string
          description: Мотоцикл
        userCity:
          type: string
          description: Город спортсмена
        userCountry:
          type: string
          description: Страна спортсмена
        athleteClass:
          $ref: '#/components/schemas/AthleteClass'
          description: Класс спортсмена на момент отправки результата
        date:
          type: integer
          format: int64
          description: Дата заезда (unixtime)
        place:
          type: integer
          description: Место в этапе
        previous:
          type: array
          items:
            $ref: '#/components/schemas/GpPreviousResult'
          description: Предыдущие результаты
        timeSeconds:
          type: integer
          description: Время лучшей попытки без штрафа (миллисекунды)
        time:
          type: string
          description: Время лучшей попытки без штрафа (мин:сек.мсек)
        fine:
          type: integer
          description: Штраф лучшей попытки
        resultTimeSeconds:
          type: integer
          description: Итоговое время лучшей попытки (миллисекунды)
        resultTime:
          type: string
          description: Итоговое время лучшей попытки (мин:сек.мсек)
        percent:
          type: number
          format: float
          description: Процент отставания от эталона
        newClass:
          type: string
          nullable: true
          description: Новый класс. null если класс не повышен
        points:
          type: integer
          description: Количество баллов
        video:
          type: string
          format: uri
          description: Видео лучшей попытки
        version:
          type: integer
          description: Номер попытки, попавшей в зачёт

    OnlineStageResultItem:
      type: object
      properties:
        userId:
          type: integer
          description: ID спортсмена
        userFullName:
          type: string
          description: Полное имя спортсмена
        userLastName:
          type: string
          description: Фамилия спортсмена
        userFirstName:
          type: string
          description: Имя спортсмена
        motorcycle:
          type: string
          description: Мотоцикл
        userCity:
          type: string
          description: Город спортсмена
        userCountry:
          type: string
          description: Страна спортсмена
        athleteClass:
          $ref: '#/components/schemas/AthleteClass'
          description: Класс спортсмена
        date:
          type: integer
          format: int64
          description: Дата отправки результата (unixtime)
        timeSeconds:
          type: integer
          description: Время без штрафа (миллисекунды)
        time:
          type: string
          description: Время без штрафа (мин:сек.мсек)
        fine:
          type: integer
          description: Штраф
        resultTimeSeconds:
          type: integer
          description: Итоговое время со штрафом (миллисекунды)
        resultTime:
          type: string
          description: Итоговое время со штрафом (мин:сек.мсек)
        percent:
          type: number
          format: float
          description: Рейтинг
        video:
          type: string
          format: uri
          description: Ссылка на видео

    StageOffline:
      type: object
      properties:
        id:
          type: integer
          description: ID этапа
        champId:
          type: integer
          description: ID чемпионата
        classes:
          type: array
          items:
            type: string
          description: Классы награждения
        champTitle:
          type: string
          description: Название чемпионата
        status:
          $ref: '#/components/schemas/StageStatusGpOnline'
        title:
          type: string
          description: Название этапа
        description:
          type: string
          description: Описание этапа (HTML)
        usersCount:
          type: integer
          description: Количество участников
        class:
          $ref: '#/components/schemas/AthleteClass'
        trackUrl:
          type: string
          format: uri
          description: Трасса этапа
        city:
          type: string
          description: Город проведения
        dateOfThe:
          type: integer
          format: int64
          description: Дата проведения (unixtime)
        referenceTimeSeconds:
          type: integer
          description: Эталонное время (миллисекунды)
        referenceTime:
          type: string
          description: Эталонное время (мин:сек.мсек)
        results:
          type: array
          items:
            $ref: '#/components/schemas/OfflineStageResultItem'

    StageGp:
      type: object
      properties:
        id:
          type: integer
          description: ID этапа
        champId:
          type: integer
          description: ID чемпионата
        champTitle:
          type: string
          description: Название чемпионата
        status:
          $ref: '#/components/schemas/StageStatusGpOnline'
        title:
          type: string
          description: Название этапа
        description:
          type: string
          description: Описание этапа (HTML)
        usersCount:
          type: integer
          description: Количество участников
        class:
          $ref: '#/components/schemas/AthleteClass'
        trackUrl:
          type: string
          format: uri
          description: Ссылка на фото трассы
        dateStart:
          type: integer
          format: int64
          description: Дата начала этапа (unixtime)
        dateEnd:
          type: integer
          format: int64
          description: Дата завершения этапа (unixtime)
        referenceTimeSeconds:
          type: integer
          description: Эталонное время (миллисекунды)
        referenceTime:
          type: string
          description: Эталонное время (мин:сек.мсек)
        results:
          type: array
          items:
            $ref: '#/components/schemas/GpStageResultItem'

    StageOnline:
      type: object
      properties:
        id:
          type: integer
          description: ID этапа
        title:
          type: string
          description: Название этапа
        description:
          type: string
          description: Описание этапа (HTML)
        usersCount:
          type: integer
          description: Количество участников
        class:
          $ref: '#/components/schemas/AthleteClass'
        trackUrl:
          type: string
          format: uri
          description: Фото трассы
        dateStart:
          type: integer
          format: int64
          description: Дата начала этапа (unixtime)
        dateEnd:
          type: integer
          format: int64
          description: Дата завершения этапа (unixtime)
        results:
          type: array
          items:
            $ref: '#/components/schemas/OnlineStageResultItem'

    FigureListItem:
      type: object
      properties:
        id:
          type: integer
          description: ID фигуры
        title:
          type: string
          description: Название фигуры
        description:
          type: string
          description: Описание фигуры (HTML)
        usersCount:
          type: integer
          description: Количество результатов
        bestTimeSeconds:
          type: integer
          description: Лучшее время (миллисекунды)
        bestTime:
          type: string
          description: Лучшее время (мин:сек.мсек)
        bestTimeInRussiaSeconds:
          type: integer
          description: Лучшее время в России (миллисекунды)
        bestTimeInRussia:
          type: string
          description: Лучшее время в России (мин:сек.мсек)
        track:
          type: string
          description: Фото трассы
        withIncClass:
          type: boolean
          description: Производится ли повышение класса по фигуре

    FigureTimeResult:
      type: object
      properties:
        motorcycle:
          type: string
          description: Мотоцикл
        class:
          $ref: '#/components/schemas/AthleteClass'
          description: Класс спортсмена на момент отправки результата
        date:
          type: integer
          format: int64
          description: Дата заезда (unixtime)
        timeSeconds:
          type: integer
          description: Время без штрафа (миллисекунды)
        time:
          type: string
          description: Время без штрафа (мин:сек.мсек)
        fine:
          type: integer
          description: Штраф
        resultTimeSeconds:
          type: integer
          description: Итоговое время со штрафом (миллисекунды)
        resultTime:
          type: string
          description: Итоговое время со штрафом (мин:сек.мсек)
        percent:
          type: number
          format: float
          description: Рейтинг
        newClass:
          type: string
          nullable: true
          description: Новый класс. null если класс не повышен
        video:
          type: string
          format: uri
          description: Ссылка на видео

    FigureResultItem:
      type: object
      properties:
        userId:
          type: integer
          description: ID спортсмена
        userFullName:
          type: string
          description: Полное имя спортсмена
        userLastName:
          type: string
          description: Фамилия спортсмена
        userFirstName:
          type: string
          description: Имя спортсмена
        userCity:
          type: string
          description: Город спортсмена
        userCountry:
          type: string
          description: Страна спортсмена
        all:
          type: array
          items:
            $ref: '#/components/schemas/FigureTimeResult'
          description: Все результаты спортсмена по этой фигуре
        best:
          $ref: '#/components/schemas/FigureTimeResult'
          description: Лучший результат спортсмена по фигуре

    Figure:
      allOf:
        - $ref: '#/components/schemas/FigureListItem'

                $ref: '#/components/schemas/FigureResultItem'

    UserListItem:
      type: object
      properties:
        id:
          type: integer
          description: ID спортсмена
        fullName:
          type: string
          description: Полное имя спортсмена
        firstName:
          type: string
          description: Имя спортсмена
        lastName:
          type: string
          description: Фамилия спортсмена
        city:
          type: string
          description: Город спортсмена
        country:
          type: string
          description: Страна спортсмена
        class:
          $ref: '#/components/schemas/AthleteClass'
        motorcycles:
          type: array
          items:
            type: string
          description: Список мотоциклов
        imgUrl:
          type: string
          description: Фото спортсмена
        number:
          type: integer
          nullable: true
          description: Номер спортсмена

    UserList:
      type: object
      properties:
        total:
          type: integer
          description: Всего найдено результатов
        items:
          type: array
          items:
            $ref: '#/components/schemas/UserListItem'

    UserFigureData:
      type: object
      properties:
        id:
          type: integer
          description: ID фигуры
        title:
          type: string
          description: Название фигуры
        motorcycle:
          type: string
          description: Мотоцикл
        date:
          type: integer
          format: int64
          description: Дата результата (unixtime)
        percent:
          type: number
          format: float
          description: Рейтинг
        link:
          type: string
          description: Ссылка на видео
        class:
          $ref: '#/components/schemas/AthleteClass'
          description: Класс на момент отправки
        newClass:
          type: string
          nullable: true
          description: Новый класс (null если перехода не было)

    UserStageData:
      type: object
      properties:
        type:
          $ref: '#/components/schemas/ChampionshipType'
          description: Тип этапа
        id:
          type: integer
          description: ID этапа
        title:
          type: string
          description: Название этапа
        motorcycle:
          type: string
          description: Мотоцикл

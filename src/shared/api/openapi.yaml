        city:
          type: string
          description: Город спортсмена
        country:
          type: string
          description: Страна спортсмена
        class:
          $ref: '#/components/schemas/AthleteClass'
        motorcycles:
          type: array
          items:
            type: string
          description: Список мотоциклов
        imgUrl:
          type: string
          description: Фото спортсмена
        number:
          type: integer
          nullable: true
          description: Номер спортсмена
        figuresData:
          type: array
          items:
            $ref: '#/components/schemas/UserFigureData'
          description: Данные о фигурах
        stagesData:
          type: array
          items:
